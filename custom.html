<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Input Sorting Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Small menu button on main page should link here -->
    <!-- Example for index.html: <a href="custom-input-page.html" class="menu-btn">Custom Input</a> -->

    <div class="main-container">
        <h1>Custom Input Sorting Visualizer ✨</h1>

        <div class="controls custom-controls">
            <!-- Custom number input -->
            <input
                type="text"
                id="customInput"
                placeholder="Enter custom input"
            />

            <button id="loadCustom">Load Numbers</button>

            <!-- Sorting algorithm dropdown -->
            <select id="algo">
                <option value="bubble">Bubble Sort</option>
                <option value="selection">Selection Sort</option>
                <option value="insertion">Insertion Sort</option>
                <option value="merge">Merge Sort</option>
                <option value="quick">Quick Sort</option>
                <option value="heap">Heap Sort</option>
            </select>

            <button id="prev">Previous</button>
            <button id="next">Next</button>
            <button id="play">Play</button>
            <button id="reset">Reset</button>

            <input type="range" id="speed" min="1" max="100" value="50" />
        </div>

        <!-- Sorting bars -->
        <div class="array-container" id="array"></div>

        <!-- Explanation -->
        <div id="infoBox">
            <h3>What’s happening?</h3>
            <div id="explanation">
                Enter custom numbers and click Load Numbers 👀
            </div>
            <div class="complexity-box" id="complexityBox">
                <p id="complexityText">
                    Complexity explanation will appear here
                </p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
